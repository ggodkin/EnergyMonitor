; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev          ; optional: default to one when running plain 'pio run'

[env:avr128db28]
platform = atmelmegaavr
board = AVR128DB28
framework = arduino
upload_protocol = serialupdi     ; adjust to your programmer
monitor_speed = 115200
extra_scripts = pre:extra_script.py   ; ← this line activates the script
build_flags =
    -D F_CPU=24000000L
; lib_deps = ... (add EmonLibCM etc. here)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:extra_script.py   ; ← same script
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.9
    knolleary/PubSubClient@^2.8
build_flags =
    -D CORE_DEBUG_LEVEL=1
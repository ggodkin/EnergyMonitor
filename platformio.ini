; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev           ; or avr128db28 — change as needed

; Common settings (shared across envs if useful)
[common]
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=1

; ── AVR128DB28 Firmware ──
[env:avr128db28]
platform = atmelmegaavr
board = AVR128DB28
framework = arduino
src_dir = avr_firmware/src         ; ← points to AVR src folder
include_dir = avr_firmware/include ; optional
upload_protocol = serialupdi       ; or tool you use (pymcuprog, etc.)
lib_deps =
    ; Add EmonLibCM (avrdb branch) – clone manually or use git:
    ; https://github.com/openenergymonitor/EmonLibCM.git#avrdb
build_flags = ${common.build_flags}
    -D F_CPU=24000000L             ; adjust clock if needed

; ── ESP32 Firmware ──
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
src_dir = esp32_firmware/src       ; ← points to ESP32 src folder
include_dir = esp32_firmware/include ; optional
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.9
    knolleary/PubSubClient@^2.8     ; MQTT
build_flags = ${common.build_flags}